<body>
  <button class="bag-button " onclick= "cartquantity = cartquantity+1; document.querySelector('#cart-summary').
      innerText = `your bag has ${cartquantity} iteams`">Add to Bag</button>
    <button class="wishlist" onclick="cartquantity = cartquantity-1; document.querySelector('#cart-summary').
      innerText = `your bag has ${cartquantity} iteams`">move to  Wishlist</button>
    <button class="bag-button" onclick="cartquantity = cartquantity+2; document.querySelector('#cart-summary').
      innerText = `your bag has ${cartquantity} iteams`;">add 1 + 1 sale iteam</button>

    <h1 id="cart-summary">Your bag has 0 iteams </h1>

      let cartquantity = 0;
      document.querySelector('#cart-summary').
      innerText = `your bag has ${cartquantity} iteams`;
    </script>
